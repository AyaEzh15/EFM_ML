services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts *

  trainer:
    build: .
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - .:/app
    command: python src/train.py

  ids-api:
    build: .
    depends_on:
      - trainer
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  report-server:
    image: python:3.11-slim
    working_dir: /reports
    volumes:
      - ./monitoring/reports:/reports
    command: >
      sh -c "
        cp evidently_data_drift_report.html index.html &&
        python -m http.server 8080
      "
    ports:
      - "8080:8080"
